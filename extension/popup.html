<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: sans-serif;
      width: 220px;
      padding: 16px;
      text-align: center;
      margin: 0;
    }
    h3 { margin: 0 0 6px; font-size: 16px; }
    p { font-size: 12px; color: #666; margin: 0 0 14px; }
    button {
      width: 100%;
      padding: 10px;
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <h3>🐦 BlackBird</h3>
  <p>Look for the ✏️ button on the page to start customizing!</p>
  <button id="openBtn">Open Editor on Page</button>
  <script src="popup.js"></script>

</html>
